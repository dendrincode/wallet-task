services:
  postgres:
    image: postgres:15-alpine
    container_name: wallet-db
    environment:
      POSTGRES_DB: walletdb
      POSTGRES_USER: walletuser
      POSTGRES_PASSWORD: walletpass123
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walletuser -d walletdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallet-network

  wallet-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wallet-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/walletdb
      SPRING_R2DBC_USERNAME: walletuser
      SPRING_R2DBC_PASSWORD: walletpass123
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    networks:
      - wallet-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  wallet-network:
    driver: bridge
