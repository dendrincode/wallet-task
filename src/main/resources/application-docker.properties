# Docker profile configuration for PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres:5432/walletdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=walletuser
spring.datasource.password=walletpass123
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

wallet.transaction.default-timeout-seconds=30
wallet.security.enabled=false

logging.level.root=INFO
logging.level.com.wallet=DEBUG
