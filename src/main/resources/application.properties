spring.application.name=wallet-service

# Server configuration
server.port=8080

# R2DBC - H2 in-memory (default profile)
# MODE=PostgreSQL makes H2 accept the same DDL as production
spring.r2dbc.url=r2dbc:h2:mem:///walletdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.r2dbc.username=sa
spring.r2dbc.password=

# Schema initialization (replaces Hibernate DDL auto)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Virtual threads — benefits any blocking code paths within the reactive context
spring.threads.virtual.enabled=true

# Security is available but disabled by default for local/API exercise usage.
# Set wallet.security.enabled=true to require authentication.
wallet.security.enabled=false

# Actuator configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=INFO
logging.level.com.wallet=DEBUG
